<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo Classes</title>
    <style>
        div{
            display: inline-block;/*tudo na mesma linha*/
            background-color: cornflowerblue;
            border: 1px solid black;/* borda do bloco */
            text-align: center;
            height: 200px; /* largura do bloco */
            width: 200px;/* altura do bloco */
        }
        
        div:hover{
            background-color: chocolate;
        }

    </style>
</head>
<body>
    <div id="01"> 01</div>
    <div id="02"> 02</div>
    <div id="03"> 03</div>
    
</body>
</html>
