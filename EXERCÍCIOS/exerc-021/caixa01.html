<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixa</title>
    <style>
        h1{
            background-color: lightgray;
            height: 300px;
            width: 300px;

            /*

            border-width: 10px;
            border-style: solid;
            border-color: darkslategray;

            para simplificar substitua  as 3 linhas por 1 só            */


            border: 10px solid darkslategray;

            /*
            padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px;
            para simplificar substitua  as 3 linhas por 1 só            */
            padding: 10px;

           /*caixa no centro da página
            margin: auto;   */

            /*
            margin-top:  20px;
            margin-right: 20px;
            margin-bottom: 40px;
            margin-left: 20px;
            */

            margin: 20px auto 40px auto;
            /*
            outline-width: 5px;
            outline-style: dotted;
            outline-color: brown;
            */
            outline: 5px dotted brown;

        }
        a{
            border-width: 10px;
            border-style: solid;
            border-color: red;
        }
    </style>
</head>
<body>
    <h1>Exemplo de Caixa box-level</h1>
    <p>Parágrafos também são exemplos de box-level,mas os <a href="#">links são exemplos de caixas inline-level</a>,vamos ver como tudo isso funciona</p>
</body>
</html>
