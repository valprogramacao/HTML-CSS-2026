<!DOCTYPE html>
<html lang="pt-br">
<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
         <title>Vídeos com HTML5</title>
</head>
<body>
    <h1>
        Inserindo vídeos hospedados localmente
    </h1>
     <p>Este vídeo está hospedado no meu próprio servidor.</p>
     <p>Video mp4</p>
    <video src="midia/video1.mp4" width="500" controls></video>
    <p>Video M4V/MKV</p>
    <video src="midia/Video1.mkv" width="500" controls></video>
    <p>Video em OGV</p>
    <video src="midia/video1.ogv"></video>
    <p>Video em Webm</p>
    <video src="midia/Video1.webm " width="500"controls></video>
    <p>Para ser compatívl com todos os navegadores,fazemos assim !</p>
    <video width="500" poster="imagens/limoes-capa.png" controls autoplay loop>
        <source src="midia/Video1.webm" type="video/webm">
        <source src="midia/Video1.mkv" type="video/mp4">
        <source src="midia/video1.mp4" type="video/mp4">
        <source src="midia/video1.ogv" type="video/ogv">
        <p>Seu navegador não tem compatibilidade com reprodução de vídeos</p>

    </video>
