<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>
    <style>
       @font-face {
        font-family: "Love";
        src: url(fontes/love\ larry\ ttf.ttf);
        format(truetype);
        font-weight: normal;
        font-style: normal;
       }
        /*
            Tipos de format()
            -opentype(otf)
            -truetype(ttf)
            -embedded-opentype
            -truetype-aat(Apple Advance Typography)
            -svg
            */
        body{
            font-family: Arial, Helvetica, sans-serif, 
        }
        h1{
            font-family: "Love";
            font-size: 3em;
            font-weight: normal;
        }
    </style>
</head>
<body>
    <h1>Título</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Numquam nobis velit sequi non ex alias rerum beatae, quisquam ducimus excepturi nostrum dolor tempore deleniti aut natus accusantium officia fugiat? Quos.</p>
</body>
</html>
